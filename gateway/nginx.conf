worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    # 1. Routing Map
    map $request_uri $target_admin_api {
        ~^/api/v1/admin/stores/[^/]+/inventory inventory_api;
        ~^/api/v1/admin/stores store_api;
        ~^/api/v1/admin/products product_api;
        ~^/api/v1/admin/auth auth_service;
    }

    # 2. CORS Map: Evaluates if the request is a preflight OPTIONS check
    map $request_method $is_preflight {
        "OPTIONS" "1";
        default   "0";
    }

    upstream inventory_api {
        zone inventory_api_zone 64k;
        server dapp-inventory-service:8000 resolve;
    }

    upstream auth_service {
        zone auth_service_zone 64k;
        server dapp-auth-service:8000 resolve;
    }

    upstream store_api {
        zone store_api_zone 64k;
        server dapp-store-api:8000 resolve;
    }

    upstream product_api {
        zone product_api_zone 64k;
        server dapp-product-service:8000 resolve;
    }

    server {
        listen 80;

        # Define CORS headers once globally at the server level
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # ----------------------------------------------------
        # Route 1: Public Auth Bypass 
        # ----------------------------------------------------
        location /api/v1/admin/auth/login/basic {
            # Intercept OPTIONS right here so it never hits the crashing upstream
            if ($is_preflight = "1") {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            auth_request off; 
            proxy_pass http://$target_admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ----------------------------------------------------
        # Route 2: Protected Admin Routing
        # ----------------------------------------------------
        location /api/v1/admin/ {
            if ($is_preflight = "1") {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            auth_request /_auth;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $role $upstream_http_x_user_role;

            proxy_set_header x-user-id $user_id;
            proxy_set_header x-user-role $role;

            proxy_pass http://$target_admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Catch-all for other api routes
        location /api/v1/ {
            return 404;
        }

        # Auth subrequest definition
        location = /_auth {
            internal;
            proxy_pass http://auth_service/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }
    }
}
