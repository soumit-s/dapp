spring.application.name=inventory
spring.kafka.bootstrap-servers=dapp-kafka:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual-immediate

spring.datasource.url=jdbc:postgresql://dapp-inventory-service-db:5432/dapp_inventory_service
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.info.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.dapp.inventory.schema.KafkaEventDto

spring.jackson.datatype.datetime.write-dates-as-timestamps=true

dapp.jwt.secret="abcd1234"